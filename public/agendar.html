<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Agendar — AgendoRapido</title>
<meta name="description" content="Agende seu horário online de forma rápida e prática.">
<meta name="theme-color" content="#2563eb">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="agendorapido.css">

<style>
  body { overflow-x: hidden; }
  .page {
    min-height: 100vh;
    background: var(--bg-1);
    padding-bottom: 32px;
  }

  /* Header do negócio */
  .biz-header {
    background: var(--bg-0);
    border-bottom: 1px solid var(--border-0);
    padding: 20px 24px;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(20px);
  }
  .biz-header-inner {
    max-width: 560px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .biz-logo {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    color: #fff;
    display: grid; place-items: center;
    font-weight: 800; font-size: 16px;
    letter-spacing: -0.02em;
    flex-shrink: 0;
  }
  .biz-info { flex: 1; min-width: 0; }
  .biz-name {
    font-size: 16px; font-weight: 600;
    letter-spacing: -0.01em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .biz-meta { font-size: 12px; color: var(--fg-3); display: flex; align-items: center; gap: 6px; }
  .biz-meta-dot { width: 6px; height: 6px; border-radius: 3px; background: var(--green); }

  /* Container */
  .container { max-width: 560px; margin: 0 auto; padding: 24px 20px; }

  /* Progress */
  .steps {
    display: flex; gap: 6px;
    margin-bottom: 18px;
  }
  .step-bar {
    flex: 1; height: 4px; border-radius: 2px;
    background: var(--bg-3);
    transition: background 0.25s;
  }
  .step-bar.active { background: var(--accent); }

  .step-label {
    font-size: 11px;
    color: var(--fg-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    margin-bottom: 4px;
  }

  h1.step-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 24px;
  }

  /* Cards de seleção */
  .opt-card {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
    background: var(--bg-0);
    border: 2px solid var(--border-0);
    border-radius: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    margin-bottom: 8px;
  }
  .opt-card:hover { border-color: var(--border-2); }
  .opt-card.selected { border-color: var(--accent); background: var(--accent-soft); }
  .opt-card-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .opt-card.selected .opt-card-icon { background: var(--accent); color: #fff; }
  .opt-card-main { flex: 1; min-width: 0; }
  .opt-card-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .opt-card-sub { font-size: 12px; color: var(--fg-3); }
  .opt-card-right {
    text-align: right;
    flex-shrink: 0;
  }
  .opt-card-price {
    font-size: 16px;
    font-weight: 700;
    color: var(--fg-0);
  }
  .opt-card.selected .opt-card-price { color: var(--accent); }

  /* Date strip */
  .date-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 16px;
    scrollbar-width: thin;
    -webkit-overflow-scrolling: touch;
  }
  .date-chip {
    flex-shrink: 0;
    min-width: 64px;
    padding: 10px 12px;
    border-radius: 12px;
    border: 2px solid var(--border-0);
    background: var(--bg-0);
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .date-chip:hover { border-color: var(--border-2); }
  .date-chip.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .date-chip.disabled {
    opacity: 0.4;
    cursor: not-allowed;
    background: var(--bg-2);
  }
  .date-chip-wd {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 2px;
  }
  .date-chip-day {
    font-size: 22px;
    font-weight: 700;
    font-family: var(--font-mono);
    letter-spacing: -0.02em;
  }
  .date-chip-mo {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 2px;
  }

  /* Time grid */
  .time-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .time-slot {
    padding: 10px 8px;
    border-radius: 10px;
    border: 1.5px solid var(--border-1);
    background: var(--bg-0);
    color: var(--fg-1);
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font-mono);
    cursor: pointer;
    text-align: center;
    transition: all 0.12s;
  }
  .time-slot:hover { border-color: var(--accent); }
  .time-slot.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .time-slot.taken {
    background: var(--bg-2);
    color: var(--fg-3);
    text-decoration: line-through;
    cursor: not-allowed;
    opacity: 0.5;
  }
  .time-slot.taken:hover { border-color: var(--border-1); }

  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--fg-2);
    margin-bottom: 8px;
  }

  /* Summary card */
  .summary {
    background: var(--bg-0);
    border: 1px solid var(--border-0);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .summary-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
  }
  .summary-row .k { color: var(--fg-3); }
  .summary-row .v { font-weight: 500; }
  .summary-total {
    border-top: 1px solid var(--border-0);
    margin-top: 8px;
    padding-top: 12px;
    font-size: 16px;
    font-weight: 700;
  }
  .summary-total .v { color: var(--accent); }

  .info-bar {
    padding: 12px 14px;
    background: var(--accent-soft);
    border-radius: 10px;
    font-size: 12px;
    color: var(--fg-1);
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .info-bar svg { width: 16px; height: 16px; color: var(--accent); flex-shrink: 0; margin-top: 1px; }

  /* Nav buttons */
  .nav-actions {
    display: flex;
    gap: 10px;
    margin-top: 28px;
  }

  /* Success state */
  .success-state {
    text-align: center;
    padding: 40px 20px;
  }
  .success-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--green-soft);
    color: var(--green);
    display: grid; place-items: center;
    margin: 0 auto 20px;
    animation: pop 0.4s ease;
  }
  .success-ring svg { width: 36px; height: 36px; }
  @keyframes pop { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* Loading */
  .skeleton {
    background: linear-gradient(90deg, var(--bg-2) 0%, var(--bg-3) 50%, var(--bg-2) 100%);
    background-size: 200% 100%;
    animation: sk-pulse 1.4s linear infinite;
    border-radius: 10px;
  }
  @keyframes sk-pulse { to { background-position: -200% 0; } }

  @media (max-width: 480px) {
    .biz-header { padding: 14px 16px; }
    .container { padding: 18px 14px; }
    .time-grid { grid-template-columns: repeat(3, 1fr); }
    h1.step-title { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="page" id="page">

  <!-- HEADER do negócio -->
  <header class="biz-header" id="biz-header">
    <div class="biz-header-inner">
      <div class="biz-logo" id="biz-logo">—</div>
      <div class="biz-info">
        <div class="biz-name" id="biz-name">Carregando...</div>
        <div class="biz-meta">
          <span class="biz-meta-dot"></span>
          <span id="biz-status">—</span>
        </div>
      </div>
      <button class="icon-btn" onclick="toggleThemeBtn()" title="Tema">
        <span id="theme-icon"></span>
      </button>
    </div>
  </header>

  <div class="container" id="content">
    <!-- preenchido por JS -->
  </div>

</div>

<script src="ar.js"></script>
<script>
const { api, fmt, el, $, toast, icon, iconEl, openModal } = AR;

const params = new URLSearchParams(location.search);
let negocioId = params.get('id');
// Fallback: parse path /{slug}
if (!negocioId) {
  const m = location.pathname.match(/^\/([a-f0-9]{24})$/i);
  if (m) negocioId = m[1];
}

const state = {
  step: 1,
  negocio: null,
  servico: null,
  data: null,
  hora: null,
  nome: '',
  telefone: '',
  horarios: { horarios: [], ocupados: [], diaInativo: false },
  loading: false,
  createdId: null,
};

// ─── Helpers ──────────────────────────────────────
function isToday(iso) {
  return iso === fmt.todayIso();
}

function buildDates() {
  const dates = [];
  const today = new Date();
  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    dates.push(d);
  }
  return dates;
}

async function loadNegocio() {
  if (!negocioId) {
    showError('Link de agendamento inválido. Pegue o link correto com o estabelecimento.');
    return;
  }
  try {
    const neg = await api.get(`/auth/negocio/${negocioId}`);
    state.negocio = neg;
    $('#biz-name').textContent = neg.negocio || 'Estabelecimento';
    $('#biz-logo').textContent = (neg.negocio || '?')[0].toUpperCase();
    $('#biz-status').textContent = `${neg.segmento || 'Negócio'} · Agendamento online`;
    render();
  } catch (err) {
    showError('Não foi possível carregar este estabelecimento.');
  }
}

async function loadHorarios() {
  if (!state.data || !negocioId) return;
  state.horarios = { horarios: [], ocupados: [], diaInativo: false };
  try {
    state.horarios = await api.get(`/agendamentos/horarios-ocupados?clinicaId=${negocioId}&data=${state.data}`);
  } catch {
    state.horarios = { horarios: [], ocupados: [], diaInativo: false };
  }
  render();
}

function showError(msg) {
  $('#content').innerHTML = '';
  const card = el('div', { class: 'card', style: { padding: '40px 24px', textAlign: 'center' } });
  card.appendChild(el('div', { style: { fontSize: '32px', marginBottom: '12px' } }, '⚠️'));
  card.appendChild(el('div', { class: 'f-16 fw-6', style: { marginBottom: '6px' } }, 'Ops!'));
  card.appendChild(el('div', { class: 'f-13 muted' }, msg));
  $('#content').appendChild(card);
}

function setStep(n) {
  state.step = n;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

// ─── Renderização das etapas ─────────────────────────
function render() {
  if (!state.negocio) return;
  if (state.step === 'done') return renderDone();
  const root = $('#content');
  root.innerHTML = '';

  // Steps bar
  const steps = el('div', { class: 'steps' });
  for (let i = 1; i <= 4; i++) {
    steps.appendChild(el('div', { class: 'step-bar ' + (i <= state.step ? 'active' : '') }));
  }
  root.appendChild(steps);
  root.appendChild(el('div', { class: 'step-label' }, `Passo ${state.step} de 4`));
  root.appendChild(el('h1', { class: 'step-title' }, [
    'Escolha o serviço',
    'Selecione data e horário',
    'Confirme seus dados',
    'Tudo certo? 🎉',
  ][state.step - 1]));

  if (state.step === 1) renderStep1(root);
  if (state.step === 2) renderStep2(root);
  if (state.step === 3) renderStep3(root);
  if (state.step === 4) renderStep4(root);

  // Nav buttons
  const nav = el('div', { class: 'nav-actions' });
  if (state.step > 1 && state.step !== 'done') {
    const back = el('button', { class: 'btn lg', onclick: () => setStep(state.step - 1) });
    back.innerHTML = icon('arrow_left') + 'Voltar';
    nav.appendChild(back);
  }

  const canContinue = (
    (state.step === 1 && state.servico) ||
    (state.step === 2 && state.data && state.hora) ||
    (state.step === 3 && state.nome.trim() && state.telefone.replace(/\D/g, '').length >= 10) ||
    state.step === 4
  );

  const next = el('button', { class: 'btn primary lg', style: { flex: '1', justifyContent: 'center' } });
  if (state.step < 4) {
    next.innerHTML = 'Continuar ' + icon('arrow_right');
    next.disabled = !canContinue;
    next.onclick = () => { if (canContinue) setStep(state.step + 1); };
  } else {
    next.innerHTML = state.loading ? '<span class="spinner"></span> Confirmando...' : (icon('check') + 'Confirmar agendamento');
    next.disabled = state.loading;
    next.onclick = () => submitAgendamento();
  }
  nav.appendChild(next);
  root.appendChild(nav);
}

function renderStep1(root) {
  const servicos = (state.negocio.servicos || []).filter(Boolean);
  if (servicos.length === 0) {
    root.appendChild(el('div', { class: 'empty' }, [
      el('div', { class: 'empty-icon' }, (() => { const s = el('span'); s.innerHTML = icon('service'); return s; })()),
      el('div', { class: 'empty-title' }, 'Sem serviços cadastrados'),
      el('div', { class: 'empty-sub' }, 'Entre em contato com o estabelecimento.'),
    ]));
    return;
  }

  servicos.forEach((srv, idx) => {
    const nome = typeof srv === 'string' ? srv : srv.nome;
    const preco = typeof srv === 'object' ? Number(srv.preco) || 0 : 0;
    const dur = typeof srv === 'object' ? srv.duracao : 0;
    const desc = typeof srv === 'object' ? srv.desc : '';
    const isSel = state.servico && state.servico.nome === nome;

    const card = el('button', { class: 'opt-card ' + (isSel ? 'selected' : ''), onclick: () => {
      state.servico = { nome, preco, duracao: dur, desc };
      render();
    }});
    const iconBox = el('div', { class: 'opt-card-icon' });
    iconBox.innerHTML = icon('service');
    card.appendChild(iconBox);
    const main = el('div', { class: 'opt-card-main' });
    main.appendChild(el('div', { class: 'opt-card-title' }, nome));
    const subTxt = [
      dur ? `${dur} min` : null,
      desc || null,
    ].filter(Boolean).join(' · ');
    if (subTxt) main.appendChild(el('div', { class: 'opt-card-sub' }, subTxt));
    card.appendChild(main);
    if (preco > 0) {
      const right = el('div', { class: 'opt-card-right' });
      right.appendChild(el('div', { class: 'opt-card-price' }, fmt.brl(preco)));
      card.appendChild(right);
    }
    if (isSel) {
      const check = el('div', { style: { width: '22px', height: '22px', borderRadius: '50%', background: 'var(--accent)', color: '#fff', display: 'grid', placeItems: 'center', flexShrink: '0' } });
      check.innerHTML = icon('check');
      check.querySelector('svg').setAttribute('width', '12');
      check.querySelector('svg').setAttribute('height', '12');
      card.appendChild(check);
    }
    root.appendChild(card);
  });
}

function renderStep2(root) {
  // Date strip
  root.appendChild(el('div', { class: 'section-label' }, 'Data'));
  const strip = el('div', { class: 'date-strip' });
  const dates = buildDates();
  dates.forEach(d => {
    const iso = fmt.isoFromDate(d);
    const wd = d.getDay();
    const horariosDia = state.negocio.horarios && (state.negocio.horarios[wd] || state.negocio.horarios[String(wd)]);
    const inactive = !horariosDia || !horariosDia.ativo;
    const isSel = state.data === iso;
    const chip = el('button', {
      class: 'date-chip ' + (isSel ? 'selected' : '') + (inactive ? ' disabled' : ''),
      disabled: inactive,
      onclick: () => {
        if (inactive) return;
        state.data = iso;
        state.hora = null;
        loadHorarios();
      },
    });
    chip.appendChild(el('div', { class: 'date-chip-wd' }, d.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '')));
    chip.appendChild(el('div', { class: 'date-chip-day' }, d.getDate()));
    chip.appendChild(el('div', { class: 'date-chip-mo' }, isToday(iso) ? 'hoje' : d.toLocaleDateString('pt-BR', { month: 'short' }).replace('.', '')));
    strip.appendChild(chip);
  });
  root.appendChild(strip);

  if (state.data) {
    root.appendChild(el('div', { class: 'section-label' }, 'Horário'));
    if (state.horarios.diaInativo) {
      root.appendChild(el('div', { class: 'empty' }, [
        el('div', { class: 'empty-title' }, 'Estabelecimento fechado neste dia'),
        el('div', { class: 'empty-sub' }, 'Escolha outra data.'),
      ]));
    } else if (state.horarios.horarios.length === 0) {
      // ainda carregando
      const grid = el('div', { class: 'time-grid' });
      for (let i = 0; i < 8; i++) grid.appendChild(el('div', { class: 'skeleton', style: { height: '40px' } }));
      root.appendChild(grid);
    } else {
      const grid = el('div', { class: 'time-grid' });
      state.horarios.horarios.forEach(h => {
        const taken = state.horarios.ocupados.includes(h);
        const isSel = state.hora === h;
        const slot = el('button', {
          class: 'time-slot ' + (isSel ? 'selected' : '') + (taken ? ' taken' : ''),
          disabled: taken,
          onclick: () => { if (!taken) { state.hora = h; render(); } },
        }, h);
        grid.appendChild(slot);
      });
      root.appendChild(grid);
    }
  }
}

function renderStep3(root) {
  // Form
  const form = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '16px' } });

  const fNome = el('div', { class: 'field' });
  fNome.appendChild(el('label', { class: 'field-label' }, 'Seu nome'));
  const inpNome = el('input', { class: 'input', type: 'text', placeholder: 'João Silva', value: state.nome, autocomplete: 'name' });
  inpNome.oninput = (e) => { state.nome = e.target.value; updateNextBtn(); };
  fNome.appendChild(inpNome);
  form.appendChild(fNome);

  const fTel = el('div', { class: 'field' });
  fTel.appendChild(el('label', { class: 'field-label' }, 'WhatsApp'));
  const inpTel = el('input', { class: 'input', type: 'tel', inputmode: 'tel', placeholder: '(11) 99999-9999', value: state.telefone, autocomplete: 'tel' });
  inpTel.oninput = (e) => {
    const masked = fmt.phone(e.target.value);
    e.target.value = masked;
    state.telefone = masked;
    updateNextBtn();
  };
  fTel.appendChild(inpTel);
  fTel.appendChild(el('div', { class: 'field-hint' }, 'Usamos para enviar a confirmação e lembretes.'));
  form.appendChild(fTel);

  root.appendChild(form);

  // Summary preview
  const sum = renderSummary();
  root.appendChild(sum);
}

function renderStep4(root) {
  const sum = renderSummary();
  root.appendChild(sum);

  const info = el('div', { class: 'info-bar' });
  info.appendChild(iconEl('whatsapp', 16));
  info.appendChild(el('div', { html: '<b>Você receberá uma mensagem no WhatsApp</b> com a confirmação e lembretes antes do horário.' }));
  root.appendChild(info);
}

function renderSummary() {
  const s = el('div', { class: 'summary' });
  const head = el('div', { class: 'summary-head' });
  head.appendChild(el('div', { class: 'f-11 fw-6 muted', style: { textTransform: 'uppercase', letterSpacing: '0.06em' } }, 'Resumo do agendamento'));
  if (state.step !== 'done') {
    const editBtn = el('button', { class: 'f-11 fw-6', style: { color: 'var(--accent)' }, onclick: () => setStep(1) }, 'Editar');
    head.appendChild(editBtn);
  }
  s.appendChild(head);

  function row(k, v) {
    const r = el('div', { class: 'summary-row' });
    r.appendChild(el('div', { class: 'k' }, k));
    r.appendChild(el('div', { class: 'v' }, v));
    return r;
  }
  s.appendChild(row('Serviço', state.servico?.nome || '—'));
  s.appendChild(row('Data', state.data ? fmt.weekdayLong(state.data).charAt(0).toUpperCase() + fmt.weekdayLong(state.data).slice(1) + ', ' + fmt.dateLong(state.data) : '—'));
  s.appendChild(row('Horário', state.hora || '—'));
  if (state.servico?.duracao) s.appendChild(row('Duração', `${state.servico.duracao} min`));
  if (state.nome && (state.step >= 3 || state.step === 'done')) s.appendChild(row('Cliente', state.nome));
  if (state.telefone && (state.step >= 3 || state.step === 'done')) s.appendChild(row('WhatsApp', state.telefone));

  if (state.servico?.preco > 0) {
    const total = el('div', { class: 'summary-row summary-total' });
    total.appendChild(el('div', { class: 'k', style: { color: 'var(--fg-0)' } }, 'Valor'));
    total.appendChild(el('div', { class: 'v' }, fmt.brl(state.servico.preco)));
    s.appendChild(total);
  }
  return s;
}

function renderDone() {
  const root = $('#content');
  root.innerHTML = '';
  const wrap = el('div', { class: 'success-state' });
  const ring = el('div', { class: 'success-ring' });
  ring.innerHTML = icon('check');
  wrap.appendChild(ring);
  wrap.appendChild(el('h1', { style: { fontSize: '24px', fontWeight: '700', marginBottom: '8px', letterSpacing: '-0.02em' } }, 'Agendamento confirmado!'));
  wrap.appendChild(el('div', { class: 'f-14 muted', style: { marginBottom: '24px' } }, 'Você vai receber uma mensagem no WhatsApp com a confirmação.'));
  wrap.appendChild(renderSummary());

  const actions = el('div', { class: 'nav-actions', style: { marginTop: '20px' } });
  const newOne = el('button', { class: 'btn lg', style: { flex: '1', justifyContent: 'center' }, onclick: () => {
    state.step = 1; state.servico = null; state.data = null; state.hora = null; state.nome = ''; state.telefone = '';
    render();
  }});
  newOne.innerHTML = icon('plus') + 'Novo agendamento';
  actions.appendChild(newOne);

  if (state.createdId) {
    const cancel = el('button', { class: 'btn lg', style: { flex: '1', justifyContent: 'center' }, onclick: () => {
      window.location.href = '/cancelar.html?id=' + state.createdId;
    }});
    cancel.innerHTML = icon('x') + 'Cancelar agendamento';
    actions.appendChild(cancel);
  }
  wrap.appendChild(actions);

  // Powered by
  wrap.appendChild(el('div', { style: { marginTop: '32px', fontSize: '11px', color: 'var(--fg-3)' } }, [
    'Powered by ', el('a', { href: 'https://agendorapido.com.br', style: { color: 'var(--accent)', fontWeight: '600' } }, 'AgendoRapido'),
  ]));

  root.appendChild(wrap);
}

function updateNextBtn() {
  // Simples revalidação só dos botões
  render();
}

async function submitAgendamento() {
  if (state.loading) return;
  state.loading = true;
  render();
  try {
    const body = {
      clinicaId: negocioId,
      pacienteNome: state.nome.trim(),
      pacienteTelefone: state.telefone.replace(/\D/g, ''),
      servico: state.servico.nome,
      data: state.data,
      hora: state.hora,
    };
    const ag = await api.post('/agendamentos', body, { auth: false });
    state.createdId = ag._id;
    // Se for aguardando_pagamento, redirecionar pra pagamento
    if (ag.status === 'aguardando_pagamento') {
      window.location.href = `/cancelar.html?id=${ag._id}&pagar=1`;
      return;
    }
    state.step = 'done';
    render();
  } catch (err) {
    toast(err.message || 'Erro ao confirmar agendamento', 'error');
    state.loading = false;
    render();
  }
}

// ─── Tema ─────────────────────────────────────
function toggleThemeBtn() {
  AR.toggleTheme();
  refreshThemeIcon();
}
function refreshThemeIcon() {
  $('#theme-icon').innerHTML = icon(AR.getTheme() === 'dark' ? 'sun' : 'moon');
}
refreshThemeIcon();

// ─── Inicializar ──────────────────────────────
loadNegocio();
</script>
