<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — AgendoRapido</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f7f7f8;
      color: #0d0d0e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      text-align: center;
      max-width: 480px;
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: none; }
    }

    /* Logo */
    .logo {
      font-size: 17px;
      font-weight: 600;
      color: #0d0d0e;
      text-decoration: none;
      letter-spacing: -0.01em;
      display: inline-block;
      margin-bottom: 48px;
    }
    .logo span { color: #2563eb; }

    /* Ícone */
    .icon-wrap {
      width: 88px;
      height: 88px;
      border-radius: 24px;
      background: #eff4ff;
      border: 1px solid rgba(37,99,235,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }

    /* Número 404 */
    .code {
      font-size: 13px;
      font-weight: 700;
      color: #2563eb;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: #5a5a6a;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #2563eb;
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background .15s, transform .15s;
    }
    .btn:hover { background: #1d4ed8; transform: translateY(-1px); }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      color: #5a5a6a;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid rgba(0,0,0,0.1);
      margin-left: 10px;
      transition: background .15s;
    }
    .btn-ghost:hover { background: #efefef; }

    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo">Agendo<span>Rapido</span></a>

    <div class="icon-wrap">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect x="4" y="7" width="28" height="24" rx="4" stroke="#2563eb" stroke-width="2"/>
        <path d="M4 14h28" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
        <path d="M12 4v6M24 4v6" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
        <path d="M13 22l10 0M13 26h6" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
        <circle cx="26" cy="26" r="5" fill="#2563eb"/>
        <path d="M24 26h4M26 24v4" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="code">Erro 404</div>
    <h1>Página não encontrada</h1>
    <p>O link que você acessou não existe ou foi removido.<br>Verifique o endereço e tente novamente.</p>

    <div class="actions">
      <a href="/" class="btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M11 7H3M6.5 3.5L3 7l3.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Voltar ao início
      </a>
      <a href="/painel" class="btn-ghost">Acessar painel</a>
    </div>
  </div>
</body>
</html>
