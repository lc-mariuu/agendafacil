<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bio — AgendoRapido</title>
<meta name="theme-color" content="#0f1729">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="agendorapido.css">

<style>
  body {
    background: linear-gradient(180deg, #0f1729 0%, #1e293b 100%);
    color: #fff;
    min-height: 100vh;
    padding: 32px 16px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -100px;
    right: -100px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(37, 99, 235, 0.25), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -150px;
    left: -150px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124, 58, 237, 0.15), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .bio-wrap {
    max-width: 420px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .bio-header {
    text-align: center;
    margin-bottom: 28px;
  }
  .bio-avatar {
    width: 104px;
    height: 104px;
    border-radius: 50%;
    margin: 0 auto 16px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    display: grid;
    place-items: center;
    font-size: 36px;
    font-weight: 800;
    color: #fff;
    border: 3px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 20px 60px rgba(37, 99, 235, 0.5);
    overflow: hidden;
  }
  .bio-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .bio-name {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .bio-status {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.6);
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 10px;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 3px;
    background: #4ade80;
    box-shadow: 0 0 8px #4ade80;
  }
  .bio-desc {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.75);
    line-height: 1.5;
    max-width: 300px;
    margin: 0 auto;
  }

  .bio-stats {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-top: 16px;
  }
  .bio-stat-num {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .bio-stat-lbl {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
  }

  /* CTA principal */
  .cta-primary {
    width: 100%;
    padding: 16px 18px;
    background: #fff;
    color: #0f1729;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .cta-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35); }
  .cta-primary-left { display: flex; align-items: center; gap: 12px; }
  .cta-primary-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: #2563eb;
    color: #fff;
    display: grid; place-items: center;
  }
  .cta-primary-icon svg { width: 18px; height: 18px; }
  .cta-primary-title { font-size: 15px; font-weight: 700; }
  .cta-primary-sub { font-size: 11px; color: #5a5a6a; }

  /* Serviços grid */
  .services-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .service-pill {
    padding: 14px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #fff;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
  }
  .service-pill:hover { background: rgba(255, 255, 255, 0.1); }
  .service-pill-icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    margin-bottom: 8px;
    display: grid; place-items: center;
    color: #fff;
  }
  .service-pill-icon svg { width: 14px; height: 14px; }
  .service-pill-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .service-pill-meta { font-size: 11px; color: rgba(255, 255, 255, 0.5); }

  /* Link card */
  .link-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #fff;
    margin-bottom: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
  }
  .link-card:hover { background: rgba(255, 255, 255, 0.1); }
  .link-card-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.1);
    display: grid; place-items: center;
  }
  .link-card-icon svg { width: 14px; height: 14px; }
  .link-card-main { flex: 1; min-width: 0; }
  .link-card-label { font-size: 13px; font-weight: 600; }
  .link-card-sub { font-size: 11px; color: rgba(255, 255, 255, 0.5); }
  .link-card-arrow svg { width: 14px; height: 14px; color: rgba(255, 255, 255, 0.4); }

  /* Section label */
  .section-label {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    margin: 24px 0 10px;
  }

  /* Reviews card */
  .reviews-card {
    padding: 16px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    color: #fff;
  }
  .reviews-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .reviews-stars { color: #fbbf24; font-size: 13px; }
  .review-item { padding-top: 12px; }
  .review-item + .review-item { border-top: 1px solid rgba(255, 255, 255, 0.08); margin-top: 12px; }
  .review-name { font-size: 12px; font-weight: 600; }
  .review-text { font-size: 12px; color: rgba(255, 255, 255, 0.7); font-style: italic; line-height: 1.5; margin-top: 4px; }

  /* Footer */
  .bio-footer {
    text-align: center;
    margin-top: 32px;
    color: rgba(255, 255, 255, 0.35);
    font-size: 11px;
  }
  .bio-footer a {
    color: #93c5fd;
    font-weight: 600;
  }

  @media (max-width: 360px) {
    .services-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="bio-wrap" id="root">

  <!-- HEADER -->
  <div class="bio-header">
    <div class="bio-avatar" id="bio-avatar">—</div>
    <h1 class="bio-name" id="bio-name">Carregando...</h1>
    <div class="bio-status">
      <span class="status-dot"></span>
      <span id="bio-status">—</span>
    </div>
    <p class="bio-desc" id="bio-desc"></p>
  </div>

  <!-- CTA -->
  <button class="cta-primary" id="cta-agendar">
    <div class="cta-primary-left">
      <div class="cta-primary-icon" id="cta-icon"></div>
      <div style="text-align:left">
        <div class="cta-primary-title">Agendar horário</div>
        <div class="cta-primary-sub" id="cta-sub">Disponível agora</div>
      </div>
    </div>
    <span id="cta-arrow"></span>
  </button>

  <!-- Serviços -->
  <div id="services-section"></div>

  <!-- Links -->
  <div id="links-section"></div>

  <!-- Reviews (mock) -->
  <div class="section-label">⭐ O que dizem por aí</div>
  <div class="reviews-card">
    <div class="reviews-head">
      <div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.7)">Últimas avaliações</div>
      <div class="reviews-stars">★★★★★ 4.9</div>
    </div>
    <div class="review-item">
      <div class="review-name">Rafael M.</div>
      <div class="review-text">"Atendimento incrível, supera as expectativas. Recomendo!"</div>
    </div>
    <div class="review-item">
      <div class="review-name">Camila T.</div>
      <div class="review-text">"Vou voltar com certeza. Profissionais top!"</div>
    </div>
  </div>

  <div class="bio-footer">
    Powered by <a href="https://agendorapido.com.br">AgendoRapido</a>
  </div>

</div>

<script src="ar.js"></script>
<script>
const { api, fmt, el, $, icon, iconEl, toast } = AR;

const params = new URLSearchParams(location.search);
let negocioId = params.get('id');
// Pega do path /bio/:slug
if (!negocioId) {
  const m = location.pathname.match(/^\/bio\/([a-f0-9]{24})/i);
  if (m) negocioId = m[1];
  else {
    const m2 = location.pathname.match(/^\/([a-f0-9]{24})/i);
    if (m2) negocioId = m2[1];
  }
}

const SERVICE_ICONS = ['service', 'scissors', 'sparkle', 'star'];
const SERVICE_COLORS = [
  'linear-gradient(135deg, #2563eb, #7c3aed)',
  'linear-gradient(135deg, #db2777, #f97316)',
  'linear-gradient(135deg, #16a34a, #10b981)',
  'linear-gradient(135deg, #d97706, #f59e0b)',
];

async function loadBio() {
  if (!negocioId) {
    $('#bio-name').textContent = 'Link inválido';
    $('#bio-status').textContent = 'Solicite o link correto';
    return;
  }
  try {
    const neg = await api.get(`/auth/negocio/${negocioId}`);
    renderBio(neg);
  } catch {
    $('#bio-name').textContent = 'Estabelecimento não encontrado';
    $('#bio-status').textContent = 'Verifique o link';
  }
}

function isOpenNow(horarios) {
  if (!horarios) return false;
  const now = new Date();
  const dia = horarios[now.getDay()] || horarios[String(now.getDay())];
  if (!dia || !dia.ativo) return false;
  const min = now.getHours() * 60 + now.getMinutes();
  const [hI, mI] = dia.inicio.split(':').map(Number);
  const [hF, mF] = dia.fim.split(':').map(Number);
  return min >= hI * 60 + mI && min < hF * 60 + mF;
}

function nextOpening(horarios) {
  if (!horarios) return 'Horário não definido';
  const now = new Date();
  for (let off = 0; off < 7; off++) {
    const d = new Date(now);
    d.setDate(now.getDate() + off);
    const dia = horarios[d.getDay()] || horarios[String(d.getDay())];
    if (!dia || !dia.ativo) continue;
    if (off === 0) {
      const [hI, mI] = dia.inicio.split(':').map(Number);
      const min = now.getHours() * 60 + now.getMinutes();
      if (min < hI * 60 + mI) return `Abre hoje às ${dia.inicio}`;
      const [hF, mF] = dia.fim.split(':').map(Number);
      if (min >= hF * 60 + mF) continue;
    } else {
      const days = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
      return `Abre ${off === 1 ? 'amanhã' : days[d.getDay()]} às ${dia.inicio}`;
    }
  }
  return 'Sem horário disponível';
}

function renderBio(neg) {
  // Avatar
  const nome = neg.negocio || neg.nome || 'Negócio';
  $('#bio-name').textContent = nome;
  const initials = nome.split(' ').filter(Boolean).map(s => s[0]).slice(0, 2).join('').toUpperCase();
  const bio = neg.bio || {};
  if (bio.foto) {
    const av = $('#bio-avatar');
    av.innerHTML = '';
    const img = document.createElement('img');
    img.src = bio.foto;
    img.alt = nome;
    av.appendChild(img);
  } else {
    $('#bio-avatar').textContent = initials;
  }

  // Status
  const horarios = neg.horarios || {};
  const open = isOpenNow(horarios);
  $('#bio-status').textContent = open ? 'Aberto agora' : nextOpening(horarios);

  // Description
  $('#bio-desc').textContent = bio.descricao || `${neg.segmento || 'Estabelecimento'} · Agende seu horário online`;

  // CTA icon + arrow
  $('#cta-icon').innerHTML = icon('calendar');
  $('#cta-icon').querySelector('svg').setAttribute('width', '18');
  $('#cta-icon').querySelector('svg').setAttribute('height', '18');
  $('#cta-arrow').innerHTML = icon('arrow_right');
  $('#cta-arrow').querySelector('svg').setAttribute('width', '16');
  $('#cta-arrow').querySelector('svg').setAttribute('height', '16');
  $('#cta-sub').textContent = (neg.servicos || []).length + ' serviços disponíveis';
  $('#cta-agendar').onclick = () => {
    window.location.href = `/agendar.html?id=${negocioId}`;
  };

  // Serviços
  const services = (neg.servicos || []).filter(Boolean).slice(0, 6);
  if (services.length > 0) {
    const section = $('#services-section');
    const grid = el('div', { class: 'services-grid' });
    services.forEach((srv, idx) => {
      const nm = typeof srv === 'string' ? srv : srv.nome;
      const pr = typeof srv === 'object' ? Number(srv.preco) || 0 : 0;
      const dur = typeof srv === 'object' ? srv.duracao : 0;
      const pill = el('button', {
        class: 'service-pill',
        onclick: () => window.location.href = `/agendar.html?id=${negocioId}`,
      });
      const ic = el('div', { class: 'service-pill-icon', style: { background: SERVICE_COLORS[idx % SERVICE_COLORS.length] } });
      ic.innerHTML = icon(SERVICE_ICONS[idx % SERVICE_ICONS.length]);
      ic.querySelector('svg').setAttribute('width', '14');
      ic.querySelector('svg').setAttribute('height', '14');
      pill.appendChild(ic);
      pill.appendChild(el('div', { class: 'service-pill-name' }, nm));
      const metaTxt = [dur ? `${dur}min` : null, pr > 0 ? fmt.brl(pr) : null].filter(Boolean).join(' · ') || 'Toque para agendar';
      pill.appendChild(el('div', { class: 'service-pill-meta' }, metaTxt));
      grid.appendChild(pill);
    });
    section.appendChild(grid);
  }

  // Links
  const linksSec = $('#links-section');
  const links = [];
  if (bio.whatsapp) {
    const wpp = bio.whatsapp.replace(/\D/g, '');
    links.push({
      icon: 'whatsapp',
      label: 'Falar no WhatsApp',
      sub: 'Tire dúvidas em tempo real',
      href: `https://wa.me/55${wpp}`,
    });
  }
  if (bio.instagram) {
    const ig = bio.instagram.replace('@', '').replace('https://instagram.com/', '').replace('https://www.instagram.com/', '');
    links.push({
      icon: 'instagram',
      label: '@' + ig,
      sub: 'Veja nossos trabalhos',
      href: 'https://instagram.com/' + ig,
    });
  }
  if (bio.endereco) {
    links.push({
      icon: 'map',
      label: bio.endereco,
      sub: 'Ver no mapa',
      href: 'https://maps.google.com/?q=' + encodeURIComponent(bio.endereco),
    });
  }
  links.forEach(l => {
    const card = el('a', { class: 'link-card', href: l.href, target: '_blank', rel: 'noopener' });
    const ic = el('div', { class: 'link-card-icon' });
    ic.innerHTML = icon(l.icon);
    ic.querySelector('svg').setAttribute('width', '14');
    ic.querySelector('svg').setAttribute('height', '14');
    card.appendChild(ic);
    const main = el('div', { class: 'link-card-main' });
    main.appendChild(el('div', { class: 'link-card-label' }, l.label));
    if (l.sub) main.appendChild(el('div', { class: 'link-card-sub' }, l.sub));
    card.appendChild(main);
    const arr = el('div', { class: 'link-card-arrow' });
    arr.innerHTML = icon('arrow_right');
    arr.querySelector('svg').setAttribute('width', '14');
    arr.querySelector('svg').setAttribute('height', '14');
    card.appendChild(arr);
    linksSec.appendChild(card);
  });
}

loadBio();
</script>

</body>
</html>
