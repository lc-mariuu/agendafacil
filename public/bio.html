<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Barbearia Navalha de Ouro — Agende seu horário</title>
  <meta name="description" content="Agende seu horário online na Barbearia Navalha de Ouro. Cortes, barba e cuidados premium em São Paulo." />
  <meta name="theme-color" content="#07060d" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/public/bio.css" />
</head>
<body>
  <!-- Ambient background -->
  <div class="ambient" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>
  <div class="grain" aria-hidden="true"></div>

  <main class="shell">
    <!-- Profile -->
    <header class="profile glass reveal" id="profile"></header>

    <!-- Primary CTA -->
    <a class="cta-primary reveal" id="ctaPrimary" href="#"></a>

    <!-- Highlight features -->
    <section class="section reveal" id="featuresSection">
      <div class="features glass" id="features"></div>
    </section>

    <!-- Social / links -->
    <section class="section reveal" id="linksSection">
      <div class="section-head">
        <h2 class="section-title">Conecte-se</h2>
        <span class="section-sub">Redes &amp; canais</span>
      </div>
      <div class="links" id="links"></div>
    </section>

    <!-- Services -->
    <section class="section reveal" id="servicesSection">
      <div class="section-head">
        <h2 class="section-title">Serviços</h2>
        <span class="section-sub">Toque para agendar</span>
      </div>
      <div class="services" id="services"></div>
    </section>

    <!-- Gallery -->
    <section class="section reveal" id="gallerySection">
      <div class="section-head">
        <h2 class="section-title">Galeria</h2>
        <span class="section-sub">Nossos trabalhos</span>
      </div>
      <div class="gallery" id="gallery"></div>
    </section>

    <!-- Reviews -->
    <section class="section reveal" id="reviewsSection">
      <div class="section-head">
        <h2 class="section-title">Depoimentos</h2>
        <span class="section-sub" id="reviewsSub"></span>
      </div>
      <div class="reviews" id="reviews"></div>
    </section>

    <!-- Location -->
    <section class="section reveal" id="locationSection">
      <div class="section-head">
        <h2 class="section-title">Onde estamos</h2>
        <span class="section-sub">Toque para a rota</span>
      </div>
      <div class="location glass" id="location"></div>
    </section>

    <!-- Hours -->
    <section class="section reveal" id="hoursSection">
      <div class="section-head">
        <h2 class="section-title">Horários</h2>
        <span class="section-sub" id="hoursStatus"></span>
      </div>
      <div class="hours glass" id="hours"></div>
    </section>

    <!-- Footer -->
    <footer class="footer reveal">
      <div class="logo">
        <span class="mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
        </span>
        AgendoRápido
      </div>
      <p>Sua agenda online, sem complicação.</p>
      <p class="made">Página criada com <b>AgendoRápido</b></p>
    </footer>
  </main>

  <!-- Fixed mobile CTA -->
  <div class="cta-fixed" id="ctaFixed"></div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Galeria">
    <button class="lb-close" aria-label="Fechar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    <button class="lb-nav prev" aria-label="Anterior"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
    <div class="lb-stage" id="lbStage"></div>
    <button class="lb-nav next" aria-label="Próxima"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
  </div>

  <!-- Bundler thumbnail / splash -->
  <template id="__bundler_thumbnail" data-bg-color="#07060d">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#22d3ee"/></linearGradient></defs>
      <rect width="1200" height="800" fill="#07060d"/>
      <circle cx="600" cy="330" r="120" fill="none" stroke="url(#g)" stroke-width="14"/>
      <rect x="430" y="520" width="340" height="90" rx="28" fill="url(#g)"/>
    </svg>
  </template>

  <script src="bio.js"></script>
</body>
</html>
