<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;overflow:hidden;
  font-family:'Inter',-apple-system,sans-serif;
  background:#060b14;
  -webkit-font-smoothing:antialiased;
}
body{
  display:flex;align-items:center;justify-content:center;
  padding:12px;
}

.card{
  width:100%;max-width:390px;
  height:100%;max-height:780px;
  border-radius:26px;overflow:hidden;
  background:#0c1520;
  border:1px solid rgba(255,255,255,0.07);
  display:flex;flex-direction:column;
  box-shadow:0 24px 64px rgba(0,0,0,0.7);
}

/* HERO */
.hero{
  position:relative;overflow:hidden;flex-shrink:0;
  background:linear-gradient(155deg,#060e1c 0%,#0d2550 45%,#1a4db5 100%);
  padding:22px 20px 20px;
  text-align:center;
}
.glow{
  position:absolute;width:260px;height:260px;border-radius:50%;
  background:radial-gradient(circle,rgba(59,130,246,0.5) 0%,transparent 68%);
  top:-80px;left:50%;transform:translateX(-50%);pointer-events:none;
}
.dots-btn{
  position:absolute;top:12px;right:12px;z-index:2;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.14);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;
  transition:background .2s;
}
.dots-btn:hover{background:rgba(255,255,255,0.18)}
.dots-btn span{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.8);display:block;}
.avatar{
  width:80px;height:80px;border-radius:50%;
  border:2.5px solid #3b82f6;
  overflow:hidden;background:#1e3a6e;
  display:flex;align-items:center;justify-content:center;
  font-size:34px;margin:0 auto 12px;position:relative;z-index:1;
  box-shadow:0 0 0 4px rgba(59,130,246,0.2),0 6px 20px rgba(0,0,0,0.4);
}
.avatar img{width:100%;height:100%;object-fit:cover}
.nome-row{
  display:flex;align-items:center;justify-content:center;gap:7px;
  margin-bottom:5px;position:relative;z-index:1;
}
.nome{color:#fff;font-size:22px;font-weight:800;letter-spacing:-0.02em;}
.verify{
  width:20px;height:20px;border-radius:50%;background:#2563eb;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 2px 8px rgba(37,99,235,0.5);
}
.verify svg{width:11px;height:11px}
.sub{color:rgba(255,255,255,0.55);font-size:12.5px;font-weight:500;margin-bottom:4px;position:relative;z-index:1;}
.desc{color:rgba(255,255,255,0.38);font-size:11.5px;font-style:italic;margin-bottom:10px;position:relative;z-index:1;}
.badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  padding:3px 11px;border-radius:100px;
  font-size:11px;color:rgba(255,255,255,0.6);font-weight:600;
  position:relative;z-index:1;
}

/* BODY */
.body{flex:1;padding:14px 14px 12px;display:flex;flex-direction:column;gap:9px;overflow:hidden;}

/* BTN AGENDAR */
.btn-ag{
  display:flex;align-items:center;gap:11px;
  width:100%;padding:13px 15px;border-radius:14px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  border:none;cursor:pointer;text-decoration:none;font-family:inherit;
  box-shadow:0 4px 16px rgba(37,99,235,0.4);
  transition:all .18s;flex-shrink:0;
}
.btn-ag:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(37,99,235,0.5)}
.ag-icon{
  width:38px;height:38px;border-radius:10px;
  background:rgba(255,255,255,0.16);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ag-text{flex:1;text-align:left}
.ag-label{font-size:9.5px;font-weight:700;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:.1em;}
.ag-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:-0.01em;margin-top:1px;}
.ag-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px;}
.ag-arr{color:rgba(255,255,255,0.5)}

/* BTN LOCAL */
.btn-loc{
  display:flex;align-items:center;gap:11px;
  width:100%;padding:11px 15px;border-radius:14px;
  background:#101b2c;border:1px solid rgba(255,255,255,0.07);
  cursor:pointer;text-decoration:none;font-family:inherit;
  transition:all .18s;flex-shrink:0;
}
.btn-loc:hover{background:#152135;border-color:rgba(255,255,255,0.12)}
.loc-icon{
  width:36px;height:36px;border-radius:10px;
  background:#192740;border:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.loc-text{flex:1;text-align:left}
.loc-label{font-size:9.5px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.1em;}
.loc-title{font-size:14px;font-weight:700;color:#fff;margin-top:1px;}
.loc-sub{font-size:11px;color:rgba(255,255,255,0.3);margin-top:1px;}
.loc-arr{color:rgba(255,255,255,0.25)}

/* SERVIÇOS */
.serv-header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.serv-titulo{font-size:14px;font-weight:700;color:#fff;}
.btn-ver{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.6);font-size:11px;font-weight:600;
  padding:4px 10px;border-radius:7px;cursor:pointer;font-family:inherit;transition:all .18s;
}
.btn-ver:hover{background:rgba(255,255,255,0.12);color:#fff}
.serv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex-shrink:0;}
.serv-card{
  background:#101b2c;border:1px solid rgba(255,255,255,0.07);
  border-radius:14px;padding:12px 8px;text-align:center;
  cursor:pointer;text-decoration:none;transition:all .18s;
  display:flex;flex-direction:column;align-items:center;gap:7px;
}
.serv-card:hover{background:#152135;transform:translateY(-1px)}
.serv-ic{
  width:40px;height:40px;border-radius:12px;background:#1a3a7a;
  display:flex;align-items:center;justify-content:center;
}
.serv-ic svg{width:19px;height:19px;color:#fff}
.serv-nome{font-size:11.5px;font-weight:700;color:#fff;line-height:1.3;}
.serv-preco{font-size:12px;font-weight:700;color:#3b82f6;}

/* SOCIAIS */
.soc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0;}
.soc-btn{
  display:flex;align-items:center;gap:9px;
  padding:12px 14px;border-radius:14px;text-decoration:none;
  border:none;cursor:pointer;font-family:inherit;transition:all .18s;
}
.soc-btn:hover{transform:translateY(-1px);filter:brightness(1.08)}
.soc-btn.wpp{background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 3px 12px rgba(34,197,94,0.3);}
.soc-btn.insta{background:linear-gradient(135deg,#e1306c,#833ab4);box-shadow:0 3px 12px rgba(131,58,180,0.3);}
.soc-ic{
  width:34px;height:34px;border-radius:9px;
  background:rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.soc-ic svg{width:17px;height:17px;fill:#fff}
.soc-txt{text-align:left}
.soc-name{font-size:13.5px;font-weight:700;color:#fff;}
.soc-sub{font-size:10.5px;color:rgba(255,255,255,0.6);margin-top:1px;}

/* POWERED */
.powered{text-align:center;font-size:11px;color:rgba(255,255,255,0.2);font-weight:500;flex-shrink:0;padding-top:2px;}
.powered span{color:#3b82f6;font-weight:700;}

.loading{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3);font-size:14px;}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="loading">Carregando...</div>
</div>
<script>
const API='https://agendafacil-wf3q.onrender.com/api'
const params=new URLSearchParams(window.location.search)
const id=params.get('id')

function iconeServico(nome){
  const n=(nome||'').toLowerCase()
  if(n.includes('corte')&&!n.includes('barba'))return`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M20 4 8.12 15.88M14.47 14.48 20 20M8.12 8.12 12 12"/></svg>`
  if(n.includes('barba'))return`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 5h18M3 12h18M7 19h10"/><path d="M5 5v7a7 7 0 0 0 14 0V5"/></svg>`
  if(n.includes('combo')||n.includes('+'))return`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
  if(n.includes('pet')||n.includes('banho')||n.includes('tosa'))return`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M10 5.172C10 3.782 8.423 2.679 6.5 3c-2.823.47-4.113 6.006-4 7 .08.703 1.725 1 3.5 1s3.08-.857 4-2z"/><path d="M14.267 5.172c0-1.39 1.577-2.493 3.5-2.172 2.823.47 4.113 6.006 4 7-.08.703-1.725 1-3.5 1s-3.08-.857-4-2z"/><path d="M8 14v.5A3.5 3.5 0 0 0 11.5 18h1a3.5 3.5 0 0 0 3.5-3.5V14"/></svg>`
  return`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
}

function fmtPreco(v){
  if(!v||isNaN(Number(v))||Number(v)<=0)return''
  return'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2})
}

const segMap={
  'Barbearia':'Barbeiro • Cuidado • Estilo',
  'Salao':'Beleza • Cuidado • Estilo',
  'Clinica':'Saúde • Cuidado • Bem-estar',
  'Pet Shop':'Pets • Cuidado • Amor',
  'Academia':'Fitness • Saúde • Força',
  'Estudio':'Arte • Estilo • Criatividade',
}

async function carregarBio(){
  if(!id){document.getElementById('card').innerHTML='<div class="loading">Link inválido</div>';return}
  try{
    const res=await fetch(`${API}/auth/negocio/${id}`)
    const data=await res.json()
    if(!res.ok){document.getElementById('card').innerHTML='<div class="loading">Negócio não encontrado</div>';return}
    const bio=data.bio||{}
    const servicos=(data.servicos||[]).slice(0,3)
    const linkAgendar=`https://agendafacil-wf3q.onrender.com/agendar.html?id=${id}`
    const tel=(bio.whatsapp||'').replace(/\D/g,'')
    const linkWhats=tel?`https://wa.me/55${tel}`:null
    const instaHandle=bio.instagram?bio.instagram.replace('@',''):null
    const linkInsta=instaHandle?`https://instagram.com/${instaHandle}`:null
    const negNome=data.negocio||data.nome||''
    const subTitulo=segMap[data.segmento]||(data.segmento||'')
    document.title=negNome

    const servicosHTML=servicos.length?`
      <div class="serv-header">
        <div class="serv-titulo">Serviços em destaque</div>
        <button class="btn-ver" onclick="window.location.href='${linkAgendar}'">Ver todos</button>
      </div>
      <div class="serv-grid">
        ${servicos.map(s=>{
          const nome=typeof s==='object'?s.nome:s
          const preco=typeof s==='object'?s.preco:0
          const p=fmtPreco(preco)
          return`<a class="serv-card" href="${linkAgendar}">
            <div class="serv-ic">${iconeServico(nome)}</div>
            <div class="serv-nome">${nome}</div>
            ${p?`<div class="serv-preco">${p}</div>`:''}
          </a>`
        }).join('')}
      </div>`
    :''

    const sociaisHTML=(linkWhats||linkInsta)?`
      <div class="soc-grid">
        ${linkWhats?`
        <a href="${linkWhats}" target="_blank" rel="noopener" class="soc-btn wpp">
          <div class="soc-ic"><svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a9.9 9.9 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.852L.057 23.885l6.204-1.628A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.808 9.808 0 0 1-5.001-1.366l-.359-.213-3.682.966.983-3.594-.234-.371A9.818 9.818 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg></div>
          <div class="soc-txt"><div class="soc-name">WhatsApp</div><div class="soc-sub">Fale comigo</div></div>
        </a>`:''}
        ${linkInsta?`
        <a href="${linkInsta}" target="_blank" rel="noopener" class="soc-btn insta">
          <div class="soc-ic"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg></div>
          <div class="soc-txt"><div class="soc-name">Instagram</div><div class="soc-sub">Veja meu trabalho</div></div>
        </a>`:''}
      </div>`
    :''

    document.getElementById('card').innerHTML=`
      <div class="hero">
        <div class="glow"></div>
        <button class="dots-btn" onclick="compartilhar()"><span></span><span></span><span></span></button>
        <div class="avatar">${bio.foto?`<img src="${bio.foto}" alt="${negNome}">`:'🏪'}</div>
        <div class="nome-row">
          <div class="nome">${negNome}</div>
          <div class="verify"><svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6l2.5 2.5 5.5-5"/></svg></div>
        </div>
        ${subTitulo?`<div class="sub">${subTitulo}</div>`:''}
        ${bio.descricao?`<div class="desc">"${bio.descricao}"</div>`:''}
        ${data.segmento?`<div class="badge">✂ ${data.segmento}</div>`:''}
      </div>
      <div class="body">
        <a href="${linkAgendar}" class="btn-ag">
          <div class="ag-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="3" width="16" height="14" rx="2.5" stroke="white" stroke-width="1.7"/><path d="M2 7.5h16M7 1.5v3M13 1.5v3" stroke="white" stroke-width="1.7" stroke-linecap="round"/></svg></div>
          <div class="ag-text">
            <div class="ag-label">Reservar agora</div>
            <div class="ag-title">Agendar Horário</div>
            <div class="ag-sub">Escolha o melhor horário para você</div>
          </div>
          <div class="ag-arr"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 12l4-4-4-4" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </a>
        ${bio.endereco?`
        <a href="${bio.endereco}" target="_blank" rel="noopener" class="btn-loc">
          <div class="loc-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2a5 5 0 0 1 5 5c0 3.5-5 9-5 9S4 10.5 4 7a5 5 0 0 1 5-5z" stroke="white" stroke-width="1.6"/><circle cx="9" cy="7" r="2" stroke="white" stroke-width="1.4"/></svg></div>
          <div class="loc-text"><div class="loc-label">Localização</div><div class="loc-title">Como Chegar</div><div class="loc-sub">Veja o endereço no mapa</div></div>
          <div class="loc-arr"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 10.5l3.5-3.5L5 3.5" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </a>`:''}
        ${servicosHTML}
        ${sociaisHTML}
        <div class="powered">Powered by <span>AgendoRapido</span></div>
      </div>
    `
  }catch(e){
    document.getElementById('card').innerHTML='<div class="loading">Erro ao carregar</div>'
  }
}

function compartilhar(){
  if(navigator.share)navigator.share({title:document.title,url:window.location.href})
  else navigator.clipboard.writeText(window.location.href).then(()=>alert('Link copiado!'))
}

carregarBio()
</script>
</body>
</html>
