<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{
  font-family:'Inter',-apple-system,sans-serif;
  min-height:100vh;
  background:#060a14;
  display:flex;align-items:flex-start;justify-content:center;
  padding:24px 16px 40px;
  -webkit-font-smoothing:antialiased;
}

.card{
  width:100%;max-width:420px;
  border-radius:28px;overflow:hidden;
  background:#0e1623;
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 32px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.04);
}

/* ── HERO ── */
.hero{
  position:relative;overflow:hidden;
  background:linear-gradient(160deg,#07111f 0%,#0d2248 35%,#1040a0 65%,#1a56d4 100%);
  padding:48px 24px 40px;
  text-align:center;
}
.hero::before{
  content:'';position:absolute;
  width:420px;height:420px;border-radius:50%;
  background:radial-gradient(circle,rgba(59,130,246,0.45) 0%,transparent 65%);
  top:-80px;left:50%;transform:translateX(-50%);
  pointer-events:none;
}
.hero::after{
  content:'';position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.03) 0%,transparent 50%);
  pointer-events:none;
}

/* três pontinhos */
.dots-btn{
  position:absolute;top:14px;right:14px;z-index:2;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.7);gap:3px;flex-direction:row;
  transition:background .2s;
}
.dots-btn:hover{background:rgba(255,255,255,0.18)}
.dots-btn span{
  width:3.5px;height:3.5px;border-radius:50%;
  background:rgba(255,255,255,0.85);display:block;
}

/* avatar */
.avatar-wrap{position:relative;z-index:1;display:inline-block;margin-bottom:18px;}
.avatar{
  width:100px;height:100px;border-radius:50%;
  border:3px solid #3b82f6;
  overflow:hidden;background:#1e3a6e;
  display:flex;align-items:center;justify-content:center;
  font-size:42px;
  box-shadow:0 0 0 4px rgba(59,130,246,0.25),0 8px 28px rgba(0,0,0,0.45);
}
.avatar img{width:100%;height:100%;object-fit:cover}

/* nome + selo */
.hero-nome-row{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:8px;position:relative;z-index:1;
}
.hero-nome{color:#fff;font-size:26px;font-weight:800;letter-spacing:-0.02em;}
.verify-badge{
  width:24px;height:24px;border-radius:50%;
  background:#2563eb;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 2px 8px rgba(37,99,235,0.5);
}
.verify-badge svg{width:13px;height:13px}

/* subtítulo (segmento estilizado como bullet list) */
.hero-sub{
  color:rgba(255,255,255,0.65);font-size:14px;font-weight:500;
  margin-bottom:6px;position:relative;z-index:1;letter-spacing:0.01em;
}

/* descrição / citação */
.hero-desc{
  color:rgba(255,255,255,0.45);font-size:13px;font-style:italic;
  margin-bottom:14px;position:relative;z-index:1;
}

/* badge segmento */
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);
  padding:5px 14px;border-radius:100px;
  font-size:12px;color:rgba(255,255,255,0.7);font-weight:600;
  position:relative;z-index:1;
}
.hero-badge svg{width:13px;height:13px;color:rgba(255,255,255,0.55)}

/* ── BODY ── */
.body{padding:18px 16px 20px;display:flex;flex-direction:column;gap:10px;}

/* ── BOTÃO AGENDAR ── */
.btn-agendar{
  display:flex;align-items:center;gap:14px;
  width:100%;padding:18px 18px;border-radius:16px;
  background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);
  border:none;cursor:pointer;text-decoration:none;
  transition:all .2s;font-family:inherit;
  box-shadow:0 6px 20px rgba(37,99,235,0.4);
}
.btn-agendar:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(37,99,235,0.5)}
.btn-ag-icon{
  width:44px;height:44px;border-radius:12px;
  background:rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.btn-ag-text{flex:1;text-align:left}
.btn-ag-label{font-size:10.5px;font-weight:700;color:rgba(255,255,255,0.65);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px;}
.btn-ag-title{font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.01em;}
.btn-ag-sub{font-size:12px;color:rgba(255,255,255,0.55);margin-top:2px;}
.btn-ag-arrow{color:rgba(255,255,255,0.6);flex-shrink:0}

/* ── BOTÃO LOCALIZAÇÃO ── */
.btn-local{
  display:flex;align-items:center;gap:14px;
  width:100%;padding:16px 18px;border-radius:16px;
  background:#151f30;border:1px solid rgba(255,255,255,0.07);
  cursor:pointer;text-decoration:none;
  transition:all .2s;font-family:inherit;
}
.btn-local:hover{background:#1a2840;border-color:rgba(255,255,255,0.12);transform:translateY(-1px)}
.btn-loc-icon{
  width:44px;height:44px;border-radius:12px;
  background:#1e2d45;border:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.btn-loc-text{flex:1;text-align:left}
.btn-loc-label{font-size:10.5px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px;}
.btn-loc-title{font-size:16px;font-weight:700;color:#fff;}
.btn-loc-sub{font-size:12px;color:rgba(255,255,255,0.35);margin-top:2px;}
.btn-loc-arrow{color:rgba(255,255,255,0.3);flex-shrink:0}

/* ── SERVIÇOS ── */
.servicos-section{margin-top:4px;}
.servicos-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.servicos-titulo{font-size:16px;font-weight:700;color:#fff;letter-spacing:-0.01em;}
.btn-ver-todos{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.7);font-size:12px;font-weight:600;
  padding:5px 12px;border-radius:8px;cursor:pointer;
  font-family:inherit;transition:all .2s;
}
.btn-ver-todos:hover{background:rgba(255,255,255,0.14);color:#fff}

.servicos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.serv-card{
  background:#151f30;border:1px solid rgba(255,255,255,0.07);
  border-radius:16px;padding:16px 12px;text-align:center;
  cursor:pointer;text-decoration:none;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.serv-card:hover{background:#1a2840;border-color:rgba(255,255,255,0.12);transform:translateY(-2px)}
.serv-icon{
  width:48px;height:48px;border-radius:14px;
  background:#1a3a7a;
  display:flex;align-items:center;justify-content:center;
}
.serv-icon svg{width:22px;height:22px;color:#fff}
.serv-nome{font-size:13px;font-weight:700;color:#fff;line-height:1.3;}
.serv-preco{font-size:13px;font-weight:700;color:#3b82f6;}

/* ── SOCIAIS ── */
.sociais-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}

.social-btn{
  display:flex;align-items:center;gap:12px;
  padding:16px 16px;border-radius:16px;text-decoration:none;
  border:none;cursor:pointer;font-family:inherit;
  transition:all .2s;
}
.social-btn:hover{transform:translateY(-1px);filter:brightness(1.08)}

.social-btn.whatsapp{background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);box-shadow:0 4px 16px rgba(34,197,94,0.3);}
.social-btn.instagram{background:linear-gradient(135deg,#e1306c 0%,#833ab4 100%);box-shadow:0 4px 16px rgba(131,58,180,0.35);}

.social-icon{
  width:38px;height:38px;border-radius:10px;
  background:rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.social-icon svg{width:20px;height:20px;fill:#fff}
.social-text{text-align:left}
.social-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:-0.01em;}
.social-sub{font-size:11.5px;color:rgba(255,255,255,0.65);margin-top:1px;}

/* ── DIVISOR + POWERED ── */
.powered-wrap{
  padding-top:14px;
  border-top:1px solid rgba(255,255,255,0.06);
  text-align:center;font-size:12px;color:rgba(255,255,255,0.25);font-weight:500;
}
.powered-wrap span{color:#3b82f6;font-weight:700;}

/* ── LOADING / ERRO ── */
.loading{text-align:center;padding:80px 20px;color:rgba(255,255,255,0.3);font-size:14px;}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="loading">Carregando...</div>
</div>

<script>
const API = 'https://agendafacil-wf3q.onrender.com/api'
const params = new URLSearchParams(window.location.search)
const id = params.get('id')

/* ícones SVG por serviço */
function iconeServico(nome) {
  const n = (nome || '').toLowerCase()
  if (n.includes('corte') && !n.includes('barba'))
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M20 4 8.12 15.88M14.47 14.48 20 20M8.12 8.12 12 12"/></svg>`
  if (n.includes('barba'))
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 5h18M3 12h18M7 19h10"/><path d="M5 5v7a7 7 0 0 0 14 0V5"/></svg>`
  if (n.includes('combo') || n.includes('+'))
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
  if (n.includes('hidra') || n.includes('color'))
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z"/><path d="M12 8v8M8 12h8"/></svg>`
  if (n.includes('manicure') || n.includes('pedicure'))
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 11V6a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v5"/><rect x="2" y="11" width="20" height="11" rx="2"/></svg>`
  if (n.includes('banho') || n.includes('tosa'))
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 12H2a10 10 0 0 0 20 0h-3M12 2v2M4.22 4.22l1.42 1.42M19.78 4.22l-1.42 1.42M2 12h2M20 12h2"/></svg>`
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
}

function fmtPreco(v) {
  if (!v || isNaN(Number(v))) return ''
  return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 })
}

async function carregarBio() {
  if (!id) { document.getElementById('card').innerHTML = '<div class="loading">Link inválido</div>'; return }
  try {
    const res  = await fetch(`${API}/auth/negocio/${id}`)
    const data = await res.json()
    if (!res.ok) { document.getElementById('card').innerHTML = '<div class="loading">Negócio não encontrado</div>'; return }

    const bio         = data.bio || {}
    const servicos    = (data.servicos || []).slice(0, 3)
    const linkAgendar = `https://agendafacil-wf3q.onrender.com/agendar.html?id=${id}`
    const tel         = (bio.whatsapp || '').replace(/\D/g, '')
    const linkWhats   = tel ? `https://wa.me/55${tel}` : null
    const instaHandle = bio.instagram ? bio.instagram.replace('@', '') : null
    const linkInsta   = instaHandle ? `https://instagram.com/${instaHandle}` : null
    const negNome     = data.negocio || data.nome || ''

    document.title = negNome

    /* subítulo a partir do segmento */
    const segMap = {
      'Barbearia':'Barbeiro • Cuidado • Estilo',
      'Salao':'Beleza • Cuidado • Estilo',
      'Clinica':'Saúde • Cuidado • Bem-estar',
      'Pet Shop':'Pets • Cuidado • Amor',
      'Academia':'Fitness • Saúde • Força',
      'Estudio':'Arte • Estilo • Criatividade',
    }
    const subTitulo = segMap[data.segmento] || (data.segmento || '')

    /* serviços grid */
    const servicosHTML = servicos.length ? `
      <div class="servicos-section">
        <div class="servicos-header">
          <div class="servicos-titulo">Serviços em destaque</div>
          <button class="btn-ver-todos" onclick="window.location.href='${linkAgendar}'">Ver todos</button>
        </div>
        <div class="servicos-grid">
          ${servicos.map(s => {
            const nome  = typeof s === 'object' ? s.nome  : s
            const preco = typeof s === 'object' ? s.preco : 0
            return `<a class="serv-card" href="${linkAgendar}">
              <div class="serv-icon">${iconeServico(nome)}</div>
              <div class="serv-nome">${nome}</div>
              ${preco > 0 ? `<div class="serv-preco">${fmtPreco(preco)}</div>` : ''}
            </a>`
          }).join('')}
        </div>
      </div>` : ''

    /* sociais */
    const sociaisHTML = (linkWhats || linkInsta) ? `
      <div class="sociais-grid">
        ${linkWhats ? `
        <a href="${linkWhats}" target="_blank" rel="noopener" class="social-btn whatsapp">
          <div class="social-icon">
            <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a9.9 9.9 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.852L.057 23.885l6.204-1.628A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.808 9.808 0 0 1-5.001-1.366l-.359-.213-3.682.966.983-3.594-.234-.371A9.818 9.818 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg>
          </div>
          <div class="social-text">
            <div class="social-name">WhatsApp</div>
            <div class="social-sub">Fale comigo</div>
          </div>
        </a>` : ''}
        ${linkInsta ? `
        <a href="${linkInsta}" target="_blank" rel="noopener" class="social-btn instagram">
          <div class="social-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
          </div>
          <div class="social-text">
            <div class="social-name">Instagram</div>
            <div class="social-sub">Veja meu trabalho</div>
          </div>
        </a>` : ''}
      </div>` : ''

    document.getElementById('card').innerHTML = `
      <div class="hero">
        <button class="dots-btn" onclick="compartilhar()" title="Compartilhar">
          <span></span><span></span><span></span>
        </button>
        <div class="avatar-wrap">
          <div class="avatar">
            ${bio.foto ? `<img src="${bio.foto}" alt="${negNome}">` : '🏪'}
          </div>
        </div>
        <div class="hero-nome-row">
          <div class="hero-nome">${negNome}</div>
          <div class="verify-badge">
            <svg viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2.5 7l3 3 6-6"/>
            </svg>
          </div>
        </div>
        ${subTitulo ? `<div class="hero-sub">${subTitulo}</div>` : ''}
        ${bio.descricao ? `<div class="hero-desc">"${bio.descricao}"</div>` : ''}
        ${data.segmento ? `
        <div class="hero-badge">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="6" cy="6" r="4"/><path d="M11.5 11.5l-2-2M6 4v2l1 1"/>
          </svg>
          ${data.segmento}
        </div>` : ''}
      </div>
      <div class="body">
        <a href="${linkAgendar}" class="btn-agendar">
          <div class="btn-ag-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <rect x="2.5" y="3.5" width="17" height="15" rx="3" stroke="white" stroke-width="1.8"/>
              <path d="M2.5 8h17M7 2v3M15 2v3" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="btn-ag-text">
            <div class="btn-ag-label">Reservar agora</div>
            <div class="btn-ag-title">Agendar Horário</div>
            <div class="btn-ag-sub">Escolha o melhor horário para você</div>
          </div>
          <div class="btn-ag-arrow">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M7 13l4-4-4-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </a>
        ${bio.endereco ? `
        <a href="${bio.endereco}" target="_blank" rel="noopener" class="btn-local">
          <div class="btn-loc-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M10 2a6 6 0 0 1 6 6c0 4-6 10-6 10S4 12 4 8a6 6 0 0 1 6-6z" stroke="white" stroke-width="1.6"/>
              <circle cx="10" cy="8" r="2" stroke="white" stroke-width="1.5"/>
            </svg>
          </div>
          <div class="btn-loc-text">
            <div class="btn-loc-label">Localização</div>
            <div class="btn-loc-title">Como Chegar</div>
            <div class="btn-loc-sub">Veja o endereço no mapa</div>
          </div>
          <div class="btn-loc-arrow">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M6 12l4-4-4-4" stroke="rgba(255,255,255,0.4)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </a>` : ''}
        ${servicosHTML}
        ${sociaisHTML}
        <div class="powered-wrap">Powered by <span>AgendoRapido</span></div>
      </div>
    `
  } catch(e) {
    document.getElementById('card').innerHTML = '<div class="loading">Erro ao carregar</div>'
  }
}

function compartilhar() {
  if (navigator.share) {
    navigator.share({ title: document.title, url: window.location.href })
  } else {
    navigator.clipboard.writeText(window.location.href).then(() => alert('Link copiado!'))
  }
}

carregarBio()
</script>
