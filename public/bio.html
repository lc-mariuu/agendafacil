<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{
  font-family:'Inter',-apple-system,sans-serif;
  min-height:100vh;
  background:#f1f5f9;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  -webkit-font-smoothing:antialiased;
}

.card{
  width:100%;max-width:400px;
  border-radius:24px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.12),0 4px 16px rgba(0,0,0,0.08);
  background:#fff;
}

/* HERO */
.hero{
  background:linear-gradient(160deg,#0f172a 0%,#1e3a5f 60%,#1e40af 100%);
  padding:40px 24px 36px;
  text-align:center;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(#3b82f6,transparent 70%);
  top:-100px;right:-80px;opacity:.2;pointer-events:none;
}
.hero::after{
  content:'';position:absolute;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(#60a5fa,transparent 70%);
  bottom:-60px;left:-40px;opacity:.15;pointer-events:none;
}

.share-btn{
  position:absolute;top:14px;right:14px;
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.7);transition:all .2s;z-index:1;
}
.share-btn:hover{background:rgba(255,255,255,0.2);color:#fff}
.share-btn svg{width:14px;height:14px}

.avatar{
  width:96px;height:96px;border-radius:50%;
  border:3px solid rgba(255,255,255,0.3);
  margin:0 auto 16px;overflow:hidden;
  background:rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;position:relative;z-index:1;
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
}
.avatar img{width:100%;height:100%;object-fit:cover}

.hero-nome{
  color:#fff;font-size:24px;font-weight:700;
  letter-spacing:-0.02em;margin-bottom:8px;
  position:relative;z-index:1;
}
.hero-desc{
  color:rgba(255,255,255,0.55);font-size:13px;
  line-height:1.6;max-width:280px;margin:0 auto;
  position:relative;z-index:1;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);
  padding:4px 12px;border-radius:100px;
  font-size:11px;color:rgba(255,255,255,0.65);font-weight:600;
  margin-top:12px;position:relative;z-index:1;
}

/* BODY */
.body{padding:20px}

/* BOTÃO PRINCIPAL */
.btn-main{
  display:flex;align-items:center;gap:12px;
  width:100%;padding:16px 18px;border-radius:14px;
  background:#2563eb;border:none;cursor:pointer;
  text-decoration:none;margin-bottom:10px;
  transition:all .2s;font-family:inherit;
  box-shadow:0 4px 14px rgba(37,99,235,0.3);
}
.btn-main:hover{background:#1d4ed8;transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,0.35)}
.btn-main-icon{
  width:36px;height:36px;border-radius:10px;
  background:rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.btn-main-text{flex:1;text-align:left}
.btn-main-label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:.06em}
.btn-main-title{font-size:15px;font-weight:700;color:#fff;margin-top:1px}
.btn-main-arrow{color:rgba(255,255,255,0.5);flex-shrink:0}

/* BOTÃO SECUNDÁRIO */
.btn-sec{
  display:flex;align-items:center;gap:12px;
  width:100%;padding:14px 18px;border-radius:14px;
  background:#f8fafc;border:1.5px solid rgba(0,0,0,0.07);
  cursor:pointer;text-decoration:none;margin-bottom:10px;
  transition:all .2s;font-family:inherit;
}
.btn-sec:hover{background:#f1f5f9;border-color:rgba(0,0,0,0.12);transform:translateY(-1px)}
.btn-sec-icon{
  width:36px;height:36px;border-radius:10px;
  background:#fff;border:1.5px solid rgba(0,0,0,0.08);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:17px;
}
.btn-sec-text{flex:1;text-align:left}
.btn-sec-label{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em}
.btn-sec-title{font-size:14px;font-weight:600;color:#0f172a;margin-top:1px}
.btn-sec-arrow{color:#cbd5e1;flex-shrink:0}

/* SOCIAIS */
.sociais-wrap{
  display:flex;gap:10px;margin-top:14px;
  padding-top:14px;border-top:1px solid #f1f5f9;
}
.social-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  padding:11px;border-radius:12px;text-decoration:none;
  border:1.5px solid rgba(0,0,0,0.07);background:#f8fafc;
  font-size:13px;font-weight:600;color:#475569;
  transition:all .2s;
}
.social-btn:hover{background:#f1f5f9;transform:translateY(-1px)}
.social-btn.whatsapp:hover{background:#f0fdf4;border-color:#86efac;color:#16a34a}
.social-btn.instagram:hover{background:#fdf4ff;border-color:#e879f9;color:#a21caf}

/* POWERED */
.powered{
  text-align:center;font-size:11px;color:#cbd5e1;
  margin-top:16px;font-weight:500;
}
.powered span{color:#2563eb;font-weight:700}

/* LOADING */
.loading{text-align:center;padding:60px 20px;color:#94a3b8;font-size:14px}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="loading">Carregando...</div>
</div>

<script>
const API = 'https://agendafacil-wf3q.onrender.com/api'
const params = new URLSearchParams(window.location.search)
const id = params.get('id')

async function carregarBio() {
  if(!id) { document.getElementById('card').innerHTML = '<div class="loading">Link inválido</div>'; return }
  try {
    const res = await fetch(`${API}/auth/negocio/${id}`)
    const data = await res.json()
    if(!res.ok) { document.getElementById('card').innerHTML = '<div class="loading">Negócio não encontrado</div>'; return }

    const bio = data.bio || {}
    const linkAgendar = `https://agendafacil-wf3q.onrender.com/agendar.html?id=${id}`
    const tel = (bio.whatsapp || '').replace(/\D/g,'')
    const linkWhats = tel ? `https://wa.me/55${tel}` : null
    const instaHandle = bio.instagram ? bio.instagram.replace('@','') : null
    const linkInsta = instaHandle ? `https://instagram.com/${instaHandle}` : null

    document.title = data.negocio

    document.getElementById('card').innerHTML = `
      <div class="hero">
        <button class="share-btn" onclick="compartilhar()" title="Compartilhar">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M9 2l3 3-3 3M2 7v1a3 3 0 0 0 3 3h7M5 5H3a1 1 0 0 0-1 1v1"/>
          </svg>
        </button>
        <div class="avatar">
          ${bio.foto ? `<img src="${bio.foto}" alt="${data.negocio}">` : '🏪'}
        </div>
        <div class="hero-nome">${data.negocio}</div>
        ${bio.descricao ? `<div class="hero-desc">${bio.descricao}</div>` : ''}
        ${data.segmento ? `<div class="hero-badge">${data.segmento}</div>` : ''}
      </div>
      <div class="body">
        <a href="${linkAgendar}" class="btn-main">
          <div class="btn-main-icon">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="3" width="14" height="13" rx="2" stroke="white" stroke-width="1.5"/><path d="M2 7h14M6 2v2M12 2v2" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <div class="btn-main-text">
            <div class="btn-main-label">Reservar agora</div>
            <div class="btn-main-title">Agendar Horário</div>
          </div>
          <div class="btn-main-arrow">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 12l4-4-4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </a>
        ${bio.endereco ? `
        <a href="${bio.endereco}" target="_blank" class="btn-sec">
          <div class="btn-sec-icon">📍</div>
          <div class="btn-sec-text">
            <div class="btn-sec-label">Localização</div>
            <div class="btn-sec-title">Como Chegar</div>
          </div>
          <div class="btn-sec-arrow">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 10.5l3.5-3.5L5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </a>` : ''}
        ${(linkWhats || linkInsta) ? `
        <div class="sociais-wrap">
          ${linkWhats ? `
          <a href="${linkWhats}" target="_blank" class="social-btn whatsapp">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a9.9 9.9 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.852L.057 23.885l6.204-1.628A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.808 9.808 0 0 1-5.001-1.366l-.359-.213-3.682.966.983-3.594-.234-.371A9.818 9.818 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg>
            WhatsApp
          </a>` : ''}
          ${linkInsta ? `
          <a href="${linkInsta}" target="_blank" class="social-btn instagram">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
            Instagram
          </a>` : ''}
        </div>` : ''}
        <div class="powered">Powered by <span>AgendoRapido</span></div>
      </div>
    `
  } catch(e) {
    document.getElementById('card').innerHTML = '<div class="loading">Erro ao carregar</div>'
  }
}

function compartilhar() {
  if(navigator.share) {
    navigator.share({ title: document.title, url: window.location.href })
  } else {
    navigator.clipboard.writeText(window.location.href)
    alert('Link copiado!')
  }
}

carregarBio()
</script>
</body>
</html>
