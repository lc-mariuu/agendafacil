<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo com cantos arredondados -->
  <rect width="512" height="512" rx="100" fill="#0f172a"/>

  <!-- Gradiente sutil no fundo -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Calendário (corpo) -->
  <rect x="96" y="136" width="320" height="272" rx="32" fill="none" stroke="url(#accentGrad)" stroke-width="26"/>

  <!-- Linha do header do calendário -->
  <line x1="96" y1="220" x2="416" y2="220" stroke="#3b82f6" stroke-width="22" stroke-linecap="round"/>

  <!-- Pinos do calendário -->
  <line x1="182" y1="96" x2="182" y2="172" stroke="#60a5fa" stroke-width="26" stroke-linecap="round"/>
  <line x1="330" y1="96" x2="330" y2="172" stroke="#60a5fa" stroke-width="26" stroke-linecap="round"/>

  <!-- Linhas de conteúdo (dias) -->
  <line x1="150" y1="280" x2="260" y2="280" stroke="#334155" stroke-width="18" stroke-linecap="round"/>
  <line x1="150" y1="330" x2="230" y2="330" stroke="#334155" stroke-width="18" stroke-linecap="round"/>

  <!-- Círculo de confirmação (check) no canto inferior direito -->
  <circle cx="350" cy="340" r="62" fill="url(#accentGrad)"/>
  <polyline points="322,340 342,362 382,316" fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
